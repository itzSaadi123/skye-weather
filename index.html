<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skye — Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sky-bg" id="skyBg">
    <div class="cloud cloud-1">☁</div>
    <div class="cloud cloud-2">⛅</div>
    <div class="cloud cloud-3">☁</div>
    <div class="cloud cloud-4">☁</div>
    <div class="star-field" id="starField"></div>
    <div class="aurora"></div>
  </div>

  <button class="theme-btn" id="themeToggle">
    <span class="sun-ico">☀️</span>
    <span class="moon-ico">🌙</span>
  </button>

  <div class="app">

    <header class="header">
      <div class="logo-row">
        <span class="logo-icon">🌤</span>
        <span class="logo-name">Skye</span>
      </div>
      <p class="logo-sub">Your personal weather companion</p>
    </header>

    <div class="search-wrap">
      <div class="search-field" id="searchField">
        <span class="search-icon">🔍</span>
        <input type="text" id="cityInput" placeholder="Search any city…" autocomplete="off" spellcheck="false">
        <button class="clear-btn" id="clearBtn" title="Clear">✕</button>
        <button class="go-btn" id="searchBtn">Search</button>
      </div>
      <div class="action-row">
        <button class="loc-btn" id="locationBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          Detect my location
        </button>
        <button class="prayer-btn" id="prayerBtn">
          🕌 Prayer Times
        </button>
      </div>
    </div>

    <!-- Loader -->
    <div class="loader-wrap" id="loader">
      <div class="orbit-loader">
        <div class="orbit-ring"></div>
        <div class="orbit-core"></div>
      </div>
      <p class="loader-text">Reading the skies…</p>
    </div>

    <!-- Error -->
    <div class="err-box" id="errorCard">
      <div class="err-icon">🌧️</div>
      <p id="errorMsg">City not found. Try another name.</p>
      <button class="err-retry" id="retryBtn">Try again</button>
    </div>

    <!-- Weather Card -->
    <div class="w-card" id="weatherCard">
      <div class="card-header">
        <div>
          <div class="city-meta" id="countryDate">—</div>
          <h1 class="city-name" id="cityName">—</h1>
        </div>
        <div class="badge-wrap">
          <div class="condition-badge" id="condition">—</div>
        </div>
      </div>

      <div class="temp-hero">
        <div class="temp-left">
          <div class="temp-number" id="temp">—</div>
          <div class="feels-row">
            <span class="feels-ico">🌡</span>
            <span class="feels-txt">Feels like <strong id="feelsLike">—</strong></span>
          </div>
        </div>
        <div class="icon-wrap">
          <img class="w-icon" id="weatherIcon" src="" alt="">
        </div>
      </div>

      <div class="divider-line"></div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-top"><span class="stat-ico">💧</span><span class="stat-val" id="humidity">—</span></div>
          <div class="stat-lbl">Humidity</div>
          <div class="stat-bar"><div class="stat-fill" id="humidityBar"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-top"><span class="stat-ico">💨</span><span class="stat-val" id="wind">—</span></div>
          <div class="stat-lbl">Wind</div>
          <div class="stat-bar"><div class="stat-fill wind-fill" id="windBar"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-top"><span class="stat-ico">👁️</span><span class="stat-val" id="visibility">—</span></div>
          <div class="stat-lbl">Visibility</div>
        </div>
        <div class="stat-card">
          <div class="stat-top"><span class="stat-ico">📊</span><span class="stat-val" id="pressure">—</span></div>
          <div class="stat-lbl">Pressure</div>
        </div>
      </div>

      <div class="sun-row">
        <div class="sun-item">
          <span class="sun-emo">🌅</span>
          <div>
            <div class="sun-lbl">Sunrise</div>
            <div class="sun-val" id="sunrise">—</div>
          </div>
        </div>
        <div class="sun-arc">
          <svg viewBox="0 0 80 40" fill="none">
            <path d="M4 36 Q40 4 76 36" stroke="url(#sunGrad)" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
            <circle class="sun-dot" id="sunDot" r="5" fill="url(#dotGrad)"/>
            <defs>
              <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#f472b6"/>
                <stop offset="100%" stop-color="#fb923c"/>
              </linearGradient>
              <radialGradient id="dotGrad">
                <stop offset="0%" stop-color="#fbbf24"/>
                <stop offset="100%" stop-color="#f97316"/>
              </radialGradient>
            </defs>
          </svg>
        </div>
        <div class="sun-item sun-right">
          <span class="sun-emo">🌇</span>
          <div>
            <div class="sun-lbl">Sunset</div>
            <div class="sun-val" id="sunset">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Prayer Times Card -->
    <div class="prayer-card" id="prayerCard">
      <div class="prayer-header">
        <div class="prayer-title-row">
          <span class="prayer-mosque">🕌</span>
          <div>
            <h2 class="prayer-title">Namaz Timings</h2>
            <p class="prayer-loc" id="prayerLocation">Loading…</p>
          </div>
        </div>
        <button class="prayer-close" id="prayerClose">✕</button>
      </div>

      <div class="prayer-date" id="prayerDate">—</div>

      <div class="prayer-list" id="prayerList">
        <div class="p-loader">
          <div class="orbit-ring"></div>
        </div>
      </div>

      <div class="prayer-footer">
        <span id="prayerNextLabel">Next prayer</span>: <strong id="prayerNext">—</strong>
      </div>
    </div>

    <footer class="foot">Made with 💜 by <strong>Saadia</strong></footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
